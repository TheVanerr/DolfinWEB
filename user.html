<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOLFIN - Makine Dokümanları</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background-color: #f3f4f6; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6 text-gray-800">

  <div class="max-w-5xl mx-auto">
    <!-- Üst Başlık -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="font-bold text-2xl text-gray-900">DOLFIN Dokümantasyon</h1>
        <p id="machine-info" class="text-sm text-gray-500 mt-1">Makine bilgisi yükleniyor...</p>
      </div>
      <button type="button" id="logout-btn" class="flex items-center gap-1 text-sm font-medium bg-white px-4 py-2 border rounded-lg hover:bg-gray-50 transition">
        <i data-lucide="log-out" style="width:16px;height:16px"></i> <span>Çıkış Yap</span>
      </button>
    </div>

    <!-- Makine Bilgi Kartı -->
    <div id="machine-card" class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-6 hidden">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <span class="text-xs text-gray-500 font-medium uppercase tracking-wide">Seri Numarası</span>
          <p id="card-serial" class="font-bold text-lg text-gray-800">—</p>
        </div>
        <div>
          <span class="text-xs text-gray-500 font-medium uppercase tracking-wide">Üst Model</span>
          <p id="card-upper" class="font-bold text-lg text-gray-800">—</p>
        </div>
        <div>
          <span class="text-xs text-gray-500 font-medium uppercase tracking-wide">Makine Modeli</span>
          <p id="card-lower" class="font-bold text-lg text-gray-800">—</p>
        </div>
      </div>
    </div>

    <!-- Doküman Tablosu -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="px-5 py-4 border-b border-gray-100 bg-gray-50">
        <h2 class="font-semibold text-lg text-gray-800">Makine Dokümanları</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left whitespace-nowrap">
          <thead class="bg-red-600 text-white">
            <tr>
              <th class="px-4 py-3 font-semibold">Doküman Adı</th>
              <th class="px-4 py-3 font-semibold">Üst Model</th>
              <th class="px-4 py-3 font-semibold">Makine Modeli</th>
              <th class="px-4 py-3 font-semibold">Doküman Tipi</th>
              <th class="px-4 py-3 font-semibold">Doküman Kodu</th>
              <th class="px-4 py-3 font-semibold">Dosya</th>
            </tr>
          </thead>
          <tbody id="user-table-body"></tbody>
        </table>
        <div id="user-empty" class="text-gray-500 text-center py-12 hidden">
          <i data-lucide="file-text" style="width:48px;height:48px" class="mx-auto mb-3 text-gray-300"></i>
          <p class="font-medium">Bu makineye tanımlı doküman bulunamadı.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- SUPABASE BAĞLANTISI ---
    const SUPABASE_URL = 'https://unttjuqydgngfqxxhqps.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_BORGWK_HJP9KolhGrLnMWw_FkR0Oj3k';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // URL parametrelerinden makine bilgilerini al
    const params = new URLSearchParams(window.location.search);
    const serialNumber = params.get('serial');
    const modelName = params.get('model');

    document.getElementById('machine-info').textContent = `Seri: ${serialNumber || '—'} | Model: ${modelName || '—'}`;

    // --- VERİYİ ÇEK ---
    async function loadMachineData() {
      if (!serialNumber) {
        document.getElementById('machine-info').textContent = 'Makine bilgisi bulunamadı.';
        return;
      }

      // Makineyi bul
      const { data: machines, error: machineError } = await supabase
        .from('machines')
        .select('*')
        .eq('serial_number', serialNumber);

      if (machineError) {
        console.error('Makine sorgu hatası:', machineError);
        return;
      }

      if (!machines || machines.length === 0) {
        document.getElementById('machine-info').textContent = 'Bu seri numarasına ait makine bulunamadı.';
        return;
      }

      const machine = machines[0];

      // Makine bilgi kartını doldur
      document.getElementById('card-serial').textContent = machine.serial_number;
      document.getElementById('card-upper').textContent = machine.upper_serial;
      document.getElementById('card-lower').textContent = machine.lower_serial;
      document.getElementById('machine-card').classList.remove('hidden');

      // Bu makineye tanımlı dokümanları bul
      const { data: machineDocs, error: mdError } = await supabase
        .from('machine_documents')
        .select('document_id')
        .eq('machine_id', machine.id);

      if (mdError) {
        console.error('İlişki sorgu hatası:', mdError);
        return;
      }

      if (!machineDocs || machineDocs.length === 0) {
        document.getElementById('user-table-body').innerHTML = '';
        document.getElementById('user-empty').classList.remove('hidden');
        return;
      }

      const docIds = machineDocs.map(md => md.document_id);

      // Dokümanları getir
      const { data: documents, error: docError } = await supabase
        .from('documents')
        .select('*')
        .in('id', docIds);

      if (docError) {
        console.error('Doküman sorgu hatası:', docError);
        return;
      }

      if (!documents || documents.length === 0) {
        document.getElementById('user-table-body').innerHTML = '';
        document.getElementById('user-empty').classList.remove('hidden');
        return;
      }

      // Tabloyu doldur
      document.getElementById('user-empty').classList.add('hidden');
      const tbody = document.getElementById('user-table-body');
      tbody.innerHTML = documents.map(d => `
        <tr class="border-b hover:bg-gray-50 transition">
          <td class="px-4 py-3 font-medium text-gray-800">${esc(d.document_name)}</td>
          <td class="px-4 py-3">${esc(d.upper_serial)}</td>
          <td class="px-4 py-3">${esc(d.lower_serial)}</td>
          <td class="px-4 py-3"><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-semibold">${esc(d.document_type)}</span></td>
          <td class="px-4 py-3 font-mono text-xs text-gray-500">${esc(d.document_code)}</td>
          <td class="px-4 py-3">
            <a href="#" onclick="event.preventDefault(); alert('Demo: ${esc(d.document_file || 'Dosya')} indiriliyor.')" class="text-red-600 hover:text-red-800 flex items-center gap-1 text-sm font-medium">
              <i data-lucide="download" style="width:16px;height:16px"></i> İndir
            </a>
          </td>
        </tr>
      `).join('');

      lucide.createIcons();
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // Çıkış butonu
    document.getElementById('logout-btn').addEventListener('click', () => {
      window.location.href = 'giris.html';
    });

    // Sayfa yüklenince veriyi çek
    document.addEventListener('DOMContentLoaded', () => {
      loadMachineData().then(() => lucide.createIcons());
    });
  </script>
</body>
</html>

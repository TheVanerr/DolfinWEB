<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOLFIN Dokümantasyon Sistemi</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background-color: #f3f4f6; }
    .view { display: none; }
    .view.active { display: flex; }
    .admin-tab { display: none !important; }
    .admin-tab.active { display: flex !important; flex-direction: column; flex: 1; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-800">
  
  <div id="app-root"></div>

  <script>
    // Sayfa yüklendiğinde giris.html'i yükle
    (async function loadApp() {
      try {
        const res = await fetch('giris.html');
        const html = await res.text();
        document.getElementById('app-root').innerHTML = html;
        
        // HTML yüklendikten sonra script'leri yeniden çalıştır
        const scripts = document.getElementById('app-root').querySelectorAll('script');
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          newScript.textContent = oldScript.textContent;
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });
      } catch (err) {
        document.getElementById('app-root').innerHTML = '<p class="text-red-600">Uygulama yüklenirken hata oluştu: ' + err.message + '</p>';
      }
    })();
  </script>

</body>
</html>
